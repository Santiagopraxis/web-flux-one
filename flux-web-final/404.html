<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error 404 — fluX One</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/logos/xo%20banco.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #3CB8EB;
      --violet: #ab4b96;
      --pink: #F5B5D2;
      --flux-gradient: linear-gradient(135deg, #3CB8EB 0%, #ab4b96 50%, #F5B5D2 100%);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      background: #050508;
      color: #fff;
      font-feature-settings: "liga" 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Background image */
    .bg-404 {
      position: fixed;
      inset: 0;
      background: url('assets/images/backgrounds/404-bg.png') no-repeat right center / cover;
      opacity: 0.45;
      filter: contrast(1.05) saturate(0.8);
      z-index: 0;
    }
    /* Gradient overlay left→transparent */
    .overlay-404 {
      position: fixed;
      inset: 0;
      background: linear-gradient(90deg, rgba(5,5,8,0.98) 0%, rgba(5,5,8,0.8) 45%, rgba(5,5,8,0.15) 100%);
      z-index: 1;
    }
    /* Logo top left */
    .logo-404 {
      position: fixed;
      top: 36px;
      left: 10%;
      width: 130px;
      z-index: 10;
      transition: opacity 0.3s;
    }
    .logo-404:hover {
      opacity: 0.8;
    }
    /* Main content container */
    .content-404 {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 1400px;
      padding: 0 10%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
    }
    .eyebrow-404 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .eyebrow-404::before {
      content: '';
      display: block;
      width: 32px;
      height: 2px;
      background: var(--flux-gradient);
      border-radius: 2px;
    }
    .title-404 {
      font-size: clamp(5rem, 14vw, 10rem);
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -0.05em;
      background: var(--flux-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      display: inline-block;
    }
    .subtitle-404 {
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      font-weight: 300;
      color: rgba(255,255,255,0.9);
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .desc-404 {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      max-width: 440px;
      line-height: 1.7;
      margin-bottom: 40px;
      font-weight: 300;
    }
    .btn-404 {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: transparent;
      color: white;
      font-family: inherit;
      font-weight: 500;
      font-size: 0.9rem;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .btn-404:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 20px rgba(60, 184, 235, 0.15);
    }
    /* Floating gradient blob */
    .blob-404 {
      position: fixed;
      bottom: -150px;
      left: -150px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(60,184,235,0.06) 0%, transparent 70%);
      z-index: 2;
      pointer-events: none;
    }
    @media (max-width: 768px) {
      .bg-404 { background-position: 70% center; }
      .overlay-404 { background: linear-gradient(180deg, rgba(5,5,8,0.92) 0%, rgba(5,5,8,0.85) 50%, rgba(5,5,8,0.95) 100%); }
      .content-404 { padding: 0 24px; align-items: center; text-align: center; }
      .logo-404 { left: 50%; transform: translateX(-50%); top: 32px; width: 110px; }
      .eyebrow-404 { justify-content: center; }
      .desc-404 { max-width: 100%; }
      .btn-404 { width: auto; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="bg-404"></div>
  <div class="overlay-404"></div>
  <div class="blob-404"></div>

  <a href="co/index.html">
    <img src="assets/images/logos/flux%20one%20en%20blanco_1.svg" alt="fluX One" class="logo-404">
  </a>

  <div class="content-404">
    <div class="eyebrow-404">Error 404</div>
    <h1 class="title-404">404</h1>
    <p class="subtitle-404">Página no encontrada</p>
    <p class="desc-404">Parece que te has salido de la ruta. La página que buscas no existe, pero tus datos siguen a salvo en nuestros servidores.</p>
    <a href="co/index.html" class="btn-404">← Volver al inicio</a>
  </div>
</body>
</html>
